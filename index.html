/* ===== PAGES ===== */
.page { display: none; padding: 20px 20px 110px; }
.page.active { display: block; }

/* ===== BOTTOM NAV ===== */
#bottom-nav {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 430px;
  background: white;
  border-top: 1px solid #FFE0B0;
  display: flex; align-items: center; justify-content: space-around;
  padding: 8px 0 20px;
  padding-bottom: max(20px, env(safe-area-inset-bottom));
  box-shadow: 0 -4px 20px rgba(255,122,0,0.1);
  z-index: 50;
}
.nav-btn {
  background: none; border: none;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  transition: opacity 0.2s;
}
.nav-btn span.icon { font-size: 22px; }
.nav-btn span.label { font-size: 10px; color: #FF7A00; font-weight: 700; }
.nav-btn.inactive { opacity: 0.35; }

#center-btn {
  width: 72px; height: 72px; border-radius: 50%;
  background: linear-gradient(135deg, #FF8C30, #FF5C00);
  border: 4px solid white;
  box-shadow: 0 6px 24px rgba(255,92,0,0.4);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  margin-top: -24px;
  transition: transform 0.12s ease;
  font-family: 'Kosugi Maru', sans-serif;
}
#center-btn:active { transform: scale(0.92); }
#center-btn .btn-egg { font-size: 26px; line-height: 1; }
#center-btn .btn-label { font-size: 11px; color: white; font-weight: 900; font-family: 'Kosugi Maru', sans-serif; margin-top: -2px; }

/* ===== CARDS ===== */
.card {
  background: white; border-radius: 20px;
  padding: 16px; margin-bottom: 16px;
  box-shadow: 0 2px 12px rgba(255,122,0,0.08);
}
.card-title { font-size: 13px; font-weight: 700; color: #FF7A00; margin-bottom: 10px; }

/* ===== PROGRESS BAR ===== */
.progress-track {
  background: #FFE8CC; border-radius: 12px; height: 16px; overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: 12px;
  background: linear-gradient(90deg, #FF8C30, #FF5C00);
  transition: width 0.8s ease;
  position: relative; overflow: hidden;
}
.progress-fill.done { background: linear-gradient(90deg, #4CAF50, #2E7D32); }
.shimmer {
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  animation: shimmer 2s infinite;
}
@keyframes shimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }

/* ===== CIRCLES ===== */
.circles-row { display: flex; justify-content: space-around; margin-top: 8px; }
.circle-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.circle-wrap svg { display: block; }
.circle-inner {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.circle-val { font-size: 22px; font-weight: 900; color: #FF7A00; line-height: 1; }
.circle-unit { font-size: 11px; color: #AAA; }
.circle-label { font-size: 12px; font-weight: 700; color: #666; text-align: center; }
.circle-sub { font-size: 11px; color: #AAA; text-align: center; }

/* ===== BAR GRAPH ===== */
.bar-graph-bars {
  display: flex; align-items: flex-end; gap: 2px; height: 60px;
}
.bar-graph-bars .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; }
.bar-graph-bars .bar-fill {
  width: 100%; background: #FFE8CC; border-radius: 3px 3px 0 0;
  transition: height 0.5s ease; min-height: 2px;
}
.bar-graph-bars .bar-fill.has-data {
  background: linear-gradient(180deg, #FF9A30, #FF6A00);
}

/* ===== RECORD LIST ===== */
.record-item {
  display: flex; align-items: center; justify-content: space-between;
  background: #FFF8F0; border-radius: 12px; padding: 10px 14px; margin-bottom: 8px;
}
.record-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: linear-gradient(135deg, #FF8C30, #FF5C00); flex-shrink: 0;
}
.record-name { font-size: 13px; font-weight: 700; color: #444; }
.record-time { font-size: 11px; color: #AAA; }
.record-protein { font-size: 15px; font-weight: 900; color: #FF7A00; }
.record-del { background: none; border: none; color: #DDD; font-size: 18px; padding: 0 4px; }

/* ===== ACHIEVEMENT ===== */
.achievement {
  background: linear-gradient(135deg, #4CAF50, #2E7D32);
  border-radius: 20px; padding: 16px 20px; text-align: center;
  color: white; margin-bottom: 16px;
  box-shadow: 0 4px 16px rgba(76,175,80,0.3);
  animation: popIn 0.5s ease;
}

/* ===== TANPAKU KUN ===== */
.tanpaku-wrap { display: flex; flex-direction: column; align-items: center; gap: 4px; margin-bottom: 16px; }
.speech-bubble {
  background: white; border: 2.5px solid #FF7A00; border-radius: 16px;
  padding: 6px 14px; font-size: 13px; color: #FF7A00; font-weight: 700;
  white-space: nowrap; box-shadow: 0 2px 8px rgba(255,122,0,0.15);
  position: relative;
}
.speech-bubble::after {
  content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
  border-left: 8px solid transparent; border-right: 8px solid transparent;
  border-top: 10px solid #FF7A00;
}
.speech-bubble::before {
  content: ''; position: absolute; bottom: -7px; left: 50%; transform: translateX(-50%);
  border-left: 7px solid transparent; border-right: 7px solid transparent;
  border-top: 9px solid white; z-index: 1;
}
#tanpaku-svg { filter: drop-shadow(0 4px 8px rgba(255,122,0,0.25)); }
.float-anim { animation: float 3s ease-in-out infinite; }
.bounce-anim { animation: bounce 0.5s ease-in-out; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
@keyframes bounce { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15) rotate(-5deg)} }

/* ===== MODALS ===== */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  display: flex; align-items: flex-end;
  z-index: 100;
  backdrop-filter: blur(4px);
}
.modal-overlay.hidden { display: none; }
.modal-sheet {
  background: white; border-radius: 28px 28px 0 0;
  width: 100%; max-height: 88vh;
  display: flex; flex-direction: column;
  animation: slideUp 0.3s ease;
  overflow: hidden;
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.modal-handle { display: flex; justify-content: center; padding: 12px 0 4px; }
.modal-handle-bar { width: 40px; height: 4px; border-radius: 2px; background: #DDD; }
.modal-body { padding: 0 20px 32px; overflow-y: auto; flex: 1; }
.modal-title { font-size: 18px; font-weight: 900; color: #FF7A00; text-align: center; margin-bottom: 20px; }

.back-btn {
  background: none; border: none; color: #FF7A00;
  font-size: 14px; font-weight: 700; margin-bottom: 12px;
  display: flex; align-items: center; gap: 4px;
}

/* food choose buttons */
.choose-btn {
  border: none; border-radius: 16px; padding: 18px;
  color: white; font-size: 16px; font-weight: 900;
  width: 100%; margin-bottom: 12px;
  display: flex; align-items: center; gap: 12px;
  text-align: left;
}
.choose-btn.food-btn { background: linear-gradient(135deg, #FF8C30, #FF5C00); box-shadow: 0 4px 16px rgba(255,92,0,0.3); }
.choose-btn.manual-btn { background: linear-gradient(135deg, #FFB830, #FF8C00); box-shadow: 0 4px 16px rgba(255,184,48,0.3); }
.choose-btn .btn-icon { font-size: 28px; }
.choose-btn .btn-main { font-size: 16px; font-weight: 900; }
.choose-btn .btn-sub { font-size: 12px; opacity: 0.85; }

.cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.cat-btn {
  border: 2px solid #FFE0B0; border-radius: 14px; padding: 14px 10px;
  background: white; text-align: center; transition: border-color 0.1s;
}
.cat-btn:hover { border-color: #FF7A00; }
.cat-btn .cat-emoji { font-size: 26px; margin-bottom: 4px; }
.cat-btn .cat-name { font-size: 12px; font-weight: 700; color: #FF7A00; }
.cat-btn .cat-count { font-size: 11px; color: #AAA; }

.food-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.food-btn {
  border: 2px solid #FFE0B0; border-radius: 14px; padding: 12px 8px;
  background: white; text-align: center; transition: border-color 0.1s;
}
.food-btn:hover { border-color: #FF7A00; }
.food-btn .food-emoji { font-size: 28px; margin-bottom: 4px; }
.food-btn .food-name { font-size: 11px; font-weight: 700; color: #444; line-height: 1.3; }
.food-btn .food-protein { font-size: 11px; color: #FF7A00; font-weight: 900; margin-top: 2px; }

/* food detail */
.food-detail-header {
  background: linear-gradient(135deg, #FFF8F0, #FFF0E0);
  border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 20px;
  border: 2px solid #FFD580;
}
.food-detail-emoji { font-size: 52px; margin-bottom: 8px; }
.food-detail-name { font-size: 18px; font-weight: 900; color: #FF7A00; }
.food-detail-per { font-size: 13px; color: #888; }

.gram-row { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.gram-btn {
  width: 44px; height: 44px; border-radius: 12px;
  border: 2px solid #FFD580; background: white;
  font-size: 22px; color: #FF7A00; font-weight: 900;
}
.gram-input {
  flex: 1; text-align: center; font-size: 28px; font-weight: 900;
  border: 2px solid #FFD580; border-radius: 12px; padding: 8px 0;
  color: #FF7A00; outline: none; width: 100%;
}

.result-box {
  background: linear-gradient(135deg, #FF8C30, #FF5C00);
  border-radius: 16px; padding: 16px; text-align: center; margin-bottom: 20px; color: white;
}
.result-box .result-label { font-size: 13px; opacity: 0.9; }
.result-box .result-val { font-size: 36px; font-weight: 900; }

.save-btn {
  width: 100%; padding: 16px; border: none; border-radius: 16px;
  background: linear-gradient(135deg, #FF8C30, #FF5C00); color: white;
  font-size: 16px; font-weight: 900; box-shadow: 0 4px 16px rgba(255,92,0,0.3);
}
.save-btn:disabled { background: #EEE; color: #AAA; box-shadow: none; }

.field-label { font-size: 14px; font-weight: 700; color: #666; margin-bottom: 8px; }
.text-input {
  width: 100%; border: 2px solid #FFD580; border-radius: 12px; padding: 12px 16px;
  font-size: 16px; outline: none; margin-bottom: 16px;
}

/* ===== QUOTE MODAL ===== */
#quote-modal .modal-overlay-center {
  position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  display: flex; align-items: center; justify-content: center; z-index: 200; padding: 24px;
}
#quote-modal .quote-card {
  background: white; border-radius: 28px; padding: 32px;
  max-width: 320px; width: 100%; text-align: center;
  animation: popIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
@keyframes popIn { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }
.quote-icon { font-size: 48px; margin-bottom: 12px; }
.quote-subtitle { font-size: 14px; color: #888; margin-bottom: 12px; }
.quote-text { font-size: 17px; font-weight: 900; color: #FF7A00; line-height: 1.6; }
.quote-close-btn {
  margin-top: 24px; padding: 12px 32px;
  background: linear-gradient(135deg, #FF8C30, #FF5C00);
  border: none; border-radius: 14px; color: white;
  font-size: 14px; font-weight: 900;
}

/* ===== WEIGHT SETUP ===== */
#setup-page {
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 24px;
}
.setup-title { font-size: 26px; font-weight: 900; color: #FF7A00; margin: 16px 0 8px; font-family: 'Kosugi Maru', sans-serif; }
.setup-sub { font-size: 14px; color: #888; margin-bottom: 28px; text-align: center; line-height: 1.6; }
.setup-card { background: white; border-radius: 24px; padding: 28px; width: 100%; max-width: 320px; box-shadow: 0 8px 32px rgba(255,122,0,0.15); }
.setup-card-title { font-size: 15px; font-weight: 700; color: #666; text-align: center; margin-bottom: 16px; }
.weight-display { font-size: 52px; font-weight: 900; color: #FF7A00; text-align: center; line-height: 1; }
.weight-unit { font-size: 14px; color: #AAA; text-align: center; margin-bottom: 8px; }
.weight-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.weight-btn { width: 52px; height: 52px; border-radius: 14px; border: 2px solid #FFD580; background: white; font-size: 24px; color: #FF7A00; font-weight: 900; }
input[type=range] { width: 100%; accent-color: #FF7A00; margin-bottom: 16px; }
.goal-preview { background: #FFF8F0; border-radius: 14px; padding: 14px; margin-bottom: 20px; border: 2px solid #FFE0B0; text-align: center; }
.goal-preview .gp-label { font-size: 13px; color: #888; }
.goal-preview .gp-val { font-size: 30px; font-weight: 900; color: #FF7A00; }
.goal-preview .gp-unit { font-size: 11px; color: #AAA; }
.start-btn { width: 100%; padding: 16px; border: none; border-radius: 16px; background: linear-gradient(135deg, #FF8C30, #FF5C00); color: white; font-size: 16px; font-weight: 900; box-shadow: 0 4px 16px rgba(255,92,0,0.3); }

/* ===== CALENDAR ===== */
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.cal-nav-btn { background: none; border: none; font-size: 22px; color: #FF7A00; padding: 4px 8px; }
.cal-month-label { font-weight: 900; font-size: 16px; color: #FF7A00; }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
.cal-dow { text-align: center; font-size: 11px; font-weight: 700; padding: 4px 0; }
.cal-day {
  border: 2px solid transparent; border-radius: 10px; background: white;
  padding: 4px 2px; min-height: 46px; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 1px;
  transition: background 0.1s;
}
.cal-day.today { border-color: #FFB830; background: #FFFAF0; }
.cal-day.selected { border-color: #FF7A00; background: #FFF0E0; }
.cal-day.has-data { background: #FFF8F0; }
.cal-day .day-num { font-size: 13px; font-weight: 600; color: #333; }
.cal-day.today .day-num { font-weight: 900; }
.cal-day .day-g { font-size: 9px; color: #FF7A00; font-weight: 700; }
.cal-day .day-dot { width: 6px; height: 6px; border-radius: 50%; background: #FF7A00; }
.cal-day .sun { color: #FF6B6B; }
.cal-day .sat { color: #6B9FFF; }
.cal-day-empty { min-height: 46px; }

/* ===== HEADER ===== */
.home-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.header-title { font-size: 22px; font-weight: 900; color: #FF7A00; font-family: 'Kosugi Maru', sans-serif; }
.header-date { font-size: 12px; color: #AAA; }
.weight-tag { background: #FFF0E0; border: 2px solid #FFD580; border-radius: 12px; padding: 6px 12px; font-size: 12px; color: #FF7A00; font-weight: 700; }

/* nums above bar */
.protein-nums { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px; }
.protein-now { font-size: 40px; font-weight: 900; color: #FF7A00; line-height: 1; }
.protein-now-g { font-size: 16px; color: #AAA; margin-left: 2px; }
.protein-goal-wrap { text-align: right; }
.protein-goal-label { font-size: 12px; color: #AAA; }
.protein-goal-val { font-size: 22px; font-weight: 900; color: #FFB830; }

.empty-msg { text-align: center; color: #CCC; padding: 16px 0; font-size: 14px; line-height: 2; }

const STORAGE_KEY = "tanpaku_data_v2";
let state = {weight: null, records: {}};

function loadState() {
  try { const s = localStorage.getItem(STORAGE_KEY); if(s) state = JSON.parse(s); } catch(e){}
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e){}
}

function todayStr() {
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function formatTime(iso) {
  const d = new Date(iso);
  return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

let setupWeight = 60;
function initSetup() {
  updateSetupUI();
  document.getElementById('weight-minus').onclick = ()=>{ setupWeight=Math.max(30,setupWeight-1); updateSetupUI(); };
  document.getElementById('weight-plus').onclick  = ()=>{ setupWeight=Math.min(200,setupWeight+1); updateSetupUI(); };
  document.getElementById('weight-range').oninput = e=>{ setupWeight=parseInt(e.target.value); updateSetupUI(); };
  document.getElementById('start-btn').onclick = ()=>{
    state.weight = setupWeight;
    state.name = document.getElementById('setup-name').value.trim() || 'あなた';
    saveState();
    document.getElementById('setup-page').style.display='none';
    document.getElementById('main-app').style.display='block';
    document.getElementById('bottom-nav').style.display='flex';
    initMainApp();
  };
}
function updateSetupUI() {
  document.getElementById('weight-display').textContent = setupWeight;
  document.getElementById('weight-range').value = setupWeight;
  document.getElementById('goal-preview-val').textContent = Math.round(setupWeight*1.6);
}

function initMainApp() {
  // header
  document.getElementById('weight-tag-val').textContent = state.weight;
  document.getElementById('user-name-disp').textContent = state.name || 'あなた';
  document.getElementById('weight-tag-btn').onclick = ()=>{
    state.weight = null; state.name = null; saveState();
    document.getElementById('main-app').style.display='none';
    document.getElementById('bottom-nav').style.display='none';
    document.getElementById('setup-page').style.display='flex';
    setupWeight = 60; updateSetupUI();
  };

  // today label
  const now = new Date();
  const opts = {year:'numeric',month:'long',day:'numeric',weekday:'short'};
  document.getElementById('today-label').textContent = now.toLocaleDateString('ja-JP',opts);

  // tanpaku msg rotation
  setInterval(()=>{
    msgIdx=(msgIdx+1)%TANPAKU_MSGS.length;
    document.getElementById('home-bubble').textContent = TANPAKU_MSGS[msgIdx];
  }, 3000);

  // calendar init
  calYear = now.getFullYear(); calMonth = now.getMonth();
  document.getElementById('cal-prev').onclick = ()=>{ calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); };
  document.getElementById('cal-next').onclick = ()=>{ calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); };

  renderHome();
  renderCalendar();
}

function showPage(p) {
  document.getElementById('page-home').classList.toggle('active', p==='home');
  document.getElementById('page-calendar').classList.toggle('active', p==='calendar');
  document.getElementById('nav-home').classList.toggle('inactive', p!=='home');
  document.getElementById('nav-cal').classList.toggle('inactive', p!=='calendar');
  currentPage = p;
  if(p==='calendar') renderCalendar();
}

// ===========================
// HOME RENDER
// ===========================
function renderHome() {
  const today = todayStr();
  const records = state.records[today] || [];
  const total = records.reduce((s,r)=>s+r.protein,0);
  const goal = Math.round(state.weight*1.6);
  const remaining = Math.max(0, goal-total);
  const pct = Math.min(total/goal,1);

  document.getElementById('goal-disp').textContent = goal;
  document.getElementById('today-total-disp').textContent = Math.round(total);

  // progress bar
  const bar = document.getElementById('main-bar');
  bar.style.width = (pct*100)+'%';
  bar.classList.toggle('done', pct>=1);

  // circles
  document.getElementById('circles-row').innerHTML = buildCircle(total,goal,'#FF7A00','摂取済み','目標 '+goal+'g')
    + buildCircle(remaining,goal,'#FFB830','残り必要量',remaining===0?'🎉 達成！':'あと '+Math.round(remaining)+'g');

  // bar graph
  const byHour = {};
  records.forEach(r=>{
    const h=new Date(r.time).getHours();
    byHour[h]=(byHour[h]||0)+r.protein;
  });
  const maxV = Math.max(goal/3,...Object.values(byHour),1);
  let barsHtml='';
  for(let h=0;h<24;h++){
    const v=byHour[h]||0;
    const hPx = v ? Math.round((v/maxV)*50) : 2;
    barsHtml+=`<div class="bar-col"><div class="bar-fill${v?' has-data':''}" style="height:${hPx}px"></div></div>`;
  }
  document.getElementById('bar-graph').innerHTML=barsHtml;

  // records
  const recEl = document.getElementById('today-records');
  if(records.length===0){
    recEl.innerHTML='<div class="empty-msg">まだ記録がありません<br>🥚</div>';
  } else {
    recEl.innerHTML = [...records].reverse().map(r=>`
      <div class="record-item">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="record-dot"></div>
          <div>
            <div class="record-name">${r.name}</div>
            <div class="record-time">${formatTime(r.time)}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span class="record-protein">+${r.protein.toFixed(1)}g</span>
          <button class="record-del" onclick="deleteRecord(${r.id})">×</button>
        </div>
      </div>`).join('');
  }

  // achievement
  document.getElementById('achievement').style.display = pct>=1 ? 'block' : 'none';
}

function buildCircle(val,max,color,label,sub) {
  const size=120, r=(size-16)/2, circ=2*Math.PI*r;
  const pct=Math.min(val/max,1), offset=circ*(1-pct);
  return `<div class="circle-wrap">
    <div style="position:relative;width:${size}px;height:${size}px">
      <svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
        <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#FFE8CC" stroke-width="10"/>
        <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="10"
          stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"
          style="transition:stroke-dashoffset .8s ease"/>
      </svg>
      <div class="circle-inner">
        <span class="circle-val">${Math.round(val)}</span>
        <span class="circle-unit">g</span>
      </div>
    </div>
    <div class="circle-label">${label}</div>
    <div class="circle-sub">${sub}</div>
  </div>`;
}

function deleteRecord(id) {
  const today=todayStr();
  state.records[today]=(state.records[today]||[]).filter(r=>r.id!==id);
  saveState(); renderHome();
}

// ===========================
// RECORD MODAL
// ===========================
let recordStep='choose', recordCategory=null, recordFood=null, recordGrams=100;

function openRecordModal() {
  recordStep='choose'; recordCategory=null; recordFood=null; recordGrams=100;
  renderRecordModal();
  document.getElementById('record-modal').classList.remove('hidden');
}
function closeRecordModal() {
  document.getElementById('record-modal').classList.add('hidden');
}
function handleOverlayClick(e, id) {
  if(e.target.id===id) closeRecordModal();
}

function renderRecordModal() {
  const el = document.getElementById('record-modal-content');
  if(recordStep==='choose') {
    el.innerHTML=`
      <button class="choose-btn food-btn" onclick="recordStep='food';renderRecordModal()">
        <span class="btn-icon">🥗</span>
        <div><div class="btn-main">食べ物から選ぶ</div><div class="btn-sub">絵文字から選択・量を入力</div></div>
      </button>
      <button class="choose-btn manual-btn" onclick="recordStep='manual';renderRecordModal()">
        <span class="btn-icon">✏️</span>
        <div><div class="btn-main">グラム数で直接入力</div><div class="btn-sub">タンパク質量をgで入力</div></div>
      </button>`;
  }
  else if(recordStep==='food' && !recordCategory) {
    let html=`<button class="back-btn" onclick="recordStep='choose';renderRecordModal()">← 戻る</button>
      <div style="font-size:13px;color:#999;margin-bottom:12px">カテゴリを選んでください</div>
      <div class="cat-grid">`;
    for(const [cat,items] of Object.entries(FOOD_LIST)) {
      html+=`<button class="cat-btn" onclick="recordCategory='${cat}';renderRecordModal()">
        <div class="cat-emoji">${items[0].emoji}</div>
        <div class="cat-name">${cat}</div>
        <div class="cat-count">${items.length}種類</div>
      </button>`;
    }
    html+='</div>';
    el.innerHTML=html;
  }
  else if(recordStep==='food' && recordCategory && !recordFood) {
    const items=FOOD_LIST[recordCategory];
    let html=`<button class="back-btn" onclick="recordCategory=null;renderRecordModal()">← ${recordCategory}</button>
      <div class="food-grid">`;
    items.forEach((f,i)=>{
      html+=`<button class="food-btn" onclick="selectFood(${i})">
        <div class="food-emoji">${f.emoji}</div>
        <div class="food-name">${f.name}</div>
        <div class="food-protein">${f.protein}g/100g</div>
      </button>`;
    });
    html+='</div>';
    el.innerHTML=html;
  }
  else if(recordStep==='food' && recordFood) {
    const calc=(recordFood.protein*recordGrams/100).toFixed(1);
    el.innerHTML=`
      <button class="back-btn" onclick="recordFood=null;renderRecordModal()">← 食べ物一覧</button>
      <div class="food-detail-header">
        <div class="food-detail-emoji">${recordFood.emoji}</div>
        <div class="food-detail-name">${recordFood.name}</div>
        <div class="food-detail-per">${recordFood.protein}g / 100g あたり</div>
      </div>
      <div class="field-label">食べた量（g）</div>
      <div class="gram-row">
        <button class="gram-btn" onclick="changeGrams(-10)">−</button>
        <input class="gram-input" type="number" id="gram-input" value="${recordGrams}" min="1" oninput="recordGrams=Math.max(1,parseInt(this.value)||1);updateCalcResult()">
        <button class="gram-btn" onclick="changeGrams(10)">＋</button>
      </div>
      <div class="result-box">
        <div class="result-label">タンパク質量</div>
        <div class="result-val" id="calc-result">${calc}g</div>
      </div>
      <button class="save-btn" onclick="saveRecord()">💪 記録する！</button>`;
  }
  else if(recordStep==='manual') {
    el.innerHTML=`
      <button class="back-btn" onclick="recordStep='choose';renderRecordModal()">← 戻る</button>
      <div class="field-label">食品名（任意）</div>
      <input class="text-input" type="text" id="manual-name" placeholder="例：プロテインバー">
      <div class="field-label">タンパク質量（g）</div>
      <input class="gram-input" type="number" id="manual-g" placeholder="例：20" style="margin-bottom:20px;display:block" oninput="updateManualBtn()">
      <button class="save-btn" id="manual-save-btn" disabled onclick="saveManual()">💪 記録する！</button>`;
  }
}

function selectFood(idx) {
  recordFood = FOOD_LIST[recordCategory][idx];
  recordGrams = 100;
  renderRecordModal();
}
function changeGrams(delta) {
  recordGrams = Math.max(10, recordGrams+delta);
  document.getElementById('gram-input').value = recordGrams;
  updateCalcResult();
}
function updateCalcResult() {
  const v = parseInt(document.getElementById('gram-input').value)||1;
  recordGrams = Math.max(1,v);
  const r = (recordFood.protein*recordGrams/100).toFixed(1);
  document.getElementById('calc-result').textContent = r+'g';
}
function updateManualBtn() {
  const v = parseFloat(document.getElementById('manual-g').value);
  document.getElementById('manual-save-btn').disabled = !(v>0);
}
function saveRecord() {
  const protein = parseFloat((recordFood.protein*recordGrams/100).toFixed(1));
  addRecord(`${recordFood.name}（${recordGrams}g）`, protein);
}
function saveManual() {
  const protein = parseFloat(document.getElementById('manual-g').value);
  const name = document.getElementById('manual-name').value.trim() || '手動入力';
  if(protein>0) addRecord(name, protein);
}
function addRecord(name, protein) {
  const today=todayStr();
  const rec = {id:Date.now(), name, protein, time:new Date().toISOString()};
  if(!state.records[today]) state.records[today]=[];
  state.records[today].push(rec);
  saveState();
  closeRecordModal();
  // bounce tanpaku-kun
  const svg = document.getElementById('home-tanpaku');
  svg.classList.remove('float-anim'); svg.classList.add('bounce-anim');
  setTimeout(()=>{ svg.classList.remove('bounce-anim'); svg.classList.add('float-anim'); },600);
  renderHome();
  // show quote after short delay
  setTimeout(()=>showQuote(QUOTES[Math.floor(Math.random()*QUOTES.length)]),400);
}

  document.getElementById('quote-modal').style.display='block';

    // already in HTML
  }

  document.getElementById('quote-modal').style.display='none';
}

// ===========================
// CALENDAR
// ===========================
function renderCalendar() {
  document.getElementById('cal-month-label').textContent = calYear+'年'+(calMonth+1)+'月';

  // dow headers
  const dows=['日','月','火','水','木','金','土'];
  const colors=['#FF6B6B','#666','#666','#666','#666','#666','#6B9FFF'];
  document.getElementById('cal-dow-row').innerHTML = dows.map((d,i)=>
    `<div class="cal-dow" style="color:${colors[i]}">${d}</div>`).join('');

  const firstDay = new Date(calYear,calMonth,1).getDay();
  const daysInMonth = new Date(calYear,calMonth+1,0).getDate();
  const today=new Date(), tyStr=todayStr();

  let html='<div class="cal-grid">';
  for(let i=0;i<firstDay;i++) html+='<div class="cal-day-empty"></div>';

  for(let d=1;d<=daysInMonth;d++){
    const key=calYear+'-'+String(calMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const recs=state.records[key]||[];
    const total=recs.reduce((s,r)=>s+r.protein,0);
    const isToday=key===tyStr;
    const isSel=key===calSelectedDay;
    const dow=(firstDay+d-1)%7;
    let cls='cal-day';
    if(isToday) cls+=' today';
    if(isSel) cls+=' selected';
    if(total>0) cls+=' has-data';
    const dc=dow===0?'#FF6B6B':dow===6?'#6B9FFF':'#333';
    html+=`<button class="${cls}" onclick="selectCalDay('${key}')">
      <span class="day-num" style="color:${dc}">${d}</span>
      ${total>0?`<span class="day-g">${Math.round(total)}g</span><div class="day-dot"></div>`:''}
    </button>`;
  }
  html+='</div>';
  document.getElementById('cal-body').innerHTML=html;

  if(calSelectedDay) renderCalDetail();
}

function selectCalDay(key) {
  calSelectedDay = calSelectedDay===key ? null : key;
  renderCalendar();
  if(calSelectedDay) renderCalDetail();
  else document.getElementById('cal-detail').style.display='none';
}

function renderCalDetail() {
  const recs=state.records[calSelectedDay]||[];
  const total=recs.reduce((s,r)=>s+r.protein,0);
  const label=calSelectedDay.replace(/-/g,'/');
  let html=`<div style="font-size:14px;font-weight:700;color:#FF7A00;margin-bottom:4px">${label} の記録</div>
    <div style="font-size:22px;font-weight:900;color:#FF7A00;margin-bottom:12px">合計 ${Math.round(total)}g</div>`;
  if(recs.length===0){
    html+='<div style="color:#CCC;font-size:13px;text-align:center;padding:12px 0">記録なし</div>';
  } else {
    html+=recs.map(r=>`<div class="record-item">
      <div><div class="record-name">${r.name}</div><div class="record-time">${formatTime(r.time)}</div></div>
      <span class="record-protein">${r.protein.toFixed(1)}g</span>
    </div>`).join('');
  }
  document.getElementById('cal-detail-content').innerHTML=html;
  document.getElementById('cal-detail').style.display='block';
}

  document.getElementById('setup-page').style.display='none';
  document.getElementById('main-app').style.display='block';
  document.getElementById('bottom-nav').style.display='flex';
  initMainApp();
} else {
  initSetup();
}
</script>
