        const loadData = () => {
            try {

                return saved ? JSON.parse(saved) : { weight: null, records: {} };
            } catch { return { weight: null, records: {} }; }
        };

            try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {}
        };

        const formatTime = (iso) => {
            const d = new Date(iso);
            return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;

                    </svg>

            const [appData, setAppData] = useState(() => loadData());
            const [page, setPage] = useState("home");
            const [weightInput, setWeightInput] = useState(60);

                    </div>
                );

            const todayRecords = appData.records[today] || [];
            const todayTotal = todayRecords.reduce((s, r) => s + r.protein, 0);
            const goal = Math.round(appData.weight * 1.6);

            return (

                        <div className="w-full bg-[#FFE8CC] h-4 rounded-full mt-4 overflow-hidden">
                            <div style={{ width: `${Math.min((todayTotal/goal)*100, 100)}%` }} className="bg-[#FF7A00] h-full transition-all duration-500"></div>
                        </div>
                    </div>

                        <h2 className="font-bold text-gray-600">今日の記録</h2>

                            </div>

                            if(p) {
                                const newRec = { id: Date.now(), name: "手入力", protein: parseFloat(p), time: new Date().toISOString() };
                                setAppData({...appData, records: { ...appData.records, [today]: [...todayRecords, newRec] }});
                            }
                        }} className="w-full py-4 border-2 border-dashed border-[#FFD580] rounded-2xl text-[#FF7A00] font-bold">+ 記録を追加</button>
                    </div>

                    <div className="fixed bottom-0 left-0 right-0 p-4 bg-white border-t border-gray-100 flex justify-around">
                        <button onClick={() => setPage("home")} className="text-2xl">🏠</button>
                        <button onClick={() => setAppData({...appData, weight: null})} className="text-2xl">⚙️</button>
                    </div>

            );
